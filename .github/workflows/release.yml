name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check
        run: NODE_OPTIONS="--max-old-space-size=4096" npm run type-check

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release archive
        run: |
          tar -czf wso2-docs-mcp-server-${{ github.ref_name }}.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            .env.example \
            docker-compose.yml \
            README.md \
            config-examples/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: wso2-docs-mcp-server-${{ github.ref_name }}.tar.gz
